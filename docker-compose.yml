version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: leadflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: leadflow_db_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: leadflow
      DB_USER: postgres
      DB_PASSWORD: leadflow_db_pass
      JWT_SECRET: change_this_to_a_long_random_string
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
